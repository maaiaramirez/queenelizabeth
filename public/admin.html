<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Biblioteca — Admin · Queen Elizabeth Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const SUPABASE_URL     = "https://nuqvqeynhssipmcmebxb.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_WjBgPoBpB1ONRrQh_JSucA_X_cCiDZY";
  const MATERIALS_BUCKET = "materials";
  // supabaseClient se crea una sola vez, dentro de library.js,
  // usando SUPABASE_URL / SUPABASE_ANON_KEY definidos arriba.
</script>
</head>
<body class="lib-body">
<div class="lib-wrap">

  <div class="lib-header">
    <div class="lib-header__brand">
      <div class="lib-header__crest" aria-hidden="true">QE</div>
      <div>
        <div class="lib-header__title">Biblioteca de materiales</div>
        <div class="lib-header__subtitle">Panel de Administración</div>
      </div>
    </div>
    <button class="lib-header__back" onclick="location.href='index.html'">← Volver al Dashboard</button>
  </div>

  <div class="lib-breadcrumb" id="breadcrumb"></div>

  <div class="lib-toolbar">
    <button class="btn btn--gold btn--sm" onclick="newFolderDialog.showModal()">📁 Nueva carpeta</button>
    <button class="btn btn--primary btn--sm" onclick="uploadFileDialog.showModal()">⬆ Subir archivo</button>
    <button class="btn btn--outline-navy btn--sm" onclick="addLinkDialog.showModal()">🔗 Agregar video/link</button>
  </div>

  <div id="folderSection">
    <p class="lib-section-label" id="folderSectionLabel" style="display:none">Carpetas</p>
    <div class="lib-grid" id="folderList"></div>
  </div>

  <div id="itemSection" style="margin-top:1.25rem">
    <p class="lib-section-label" id="itemSectionLabel" style="display:none">Materiales</p>
    <div class="lib-grid" id="itemList"></div>
  </div>

  <div id="emptyState" style="display:none" class="lib-empty">
    <div class="lib-empty__icon">📭</div>
    Esta carpeta está vacía.
  </div>

</div>

<!-- Dialog: nueva carpeta -->
<dialog id="newFolderDialog">
  <h3>Nueva carpeta</h3>
  <label>Nombre
    <input id="newFolderName" type="text" placeholder="Ej: Nivel B1" />
  </label>
  <div class="lib-toolbar">
    <button class="btn btn--outline-navy btn--sm" onclick="newFolderDialog.close()">Cancelar</button>
    <button class="btn btn--primary btn--sm" onclick="handleCreateFolder()">Crear</button>
  </div>
</dialog>

<!-- Dialog: subir archivo -->
<dialog id="uploadFileDialog">
  <h3>Subir archivo</h3>
  <label>Tipo
    <select id="uploadType">
      <option value="pdf">PDF</option>
      <option value="image">Imagen</option>
      <option value="audio">Audio</option>
      <option value="document">Word/PowerPoint</option>
    </select>
  </label>
  <label>Archivo
    <input id="uploadFile" type="file" />
  </label>
  <label>Asociar a lección (opcional, ID)
    <input id="uploadLessonId" type="text" placeholder="lesson id (opcional)" />
  </label>
  <div class="lib-toolbar">
    <button class="btn btn--outline-navy btn--sm" onclick="uploadFileDialog.close()">Cancelar</button>
    <button class="btn btn--primary btn--sm" id="uploadFileBtn" onclick="handleUploadFile()">Subir</button>
  </div>
</dialog>

<!-- Dialog: agregar link/video -->
<dialog id="addLinkDialog">
  <h3>Agregar video o link externo</h3>
  <label>Tipo
    <select id="linkType">
      <option value="video">Video (YouTube/Vimeo)</option>
      <option value="link">Link externo</option>
    </select>
  </label>
  <label>Nombre
    <input id="linkName" type="text" />
  </label>
  <label>URL
    <input id="linkUrl" type="text" placeholder="https://..." />
  </label>
  <label>Asociar a lección (opcional, ID)
    <input id="linkLessonId" type="text" placeholder="lesson id (opcional)" />
  </label>
  <div class="lib-toolbar">
    <button class="btn btn--outline-navy btn--sm" onclick="addLinkDialog.close()">Cancelar</button>
    <button class="btn btn--primary btn--sm" onclick="handleAddLink()">Agregar</button>
  </div>
</dialog>

<script src="library.js"></script>
<script>
  let currentFolderId = null;
  let breadcrumbTrail = []; // [{id, name}]
  let itemsCache = new Map(); // id -> item, evita re-incrustar JSON en el HTML

  const ICONS = { pdf: '📄', video: '🎬', audio: '🎵', image: '🖼️', document: '📝', link: '🔗' };

  async function render() {
    renderBreadcrumb();
    const folderList = document.getElementById('folderList');
    const itemList = document.getElementById('itemList');
    const folderLabel = document.getElementById('folderSectionLabel');
    const itemLabel = document.getElementById('itemSectionLabel');
    const empty = document.getElementById('emptyState');

    folderList.innerHTML = '';
    itemList.innerHTML = '';
    empty.style.display = 'none';
    folderLabel.style.display = 'none';
    itemLabel.style.display = 'none';
    document.querySelectorAll('.lib-loading').forEach(el => el.remove());
    const loadingEl = document.createElement('p');
    loadingEl.className = 'lib-loading';
    loadingEl.textContent = 'Cargando…';
    folderList.after(loadingEl);

    let folders = [];
    let items = [];
    try {
      [folders, items] = await Promise.all([
        getFolders(currentFolderId),
        getItems({ folderId: currentFolderId }),
      ]);
    } catch (e) {
      loadingEl.remove();
      folderList.innerHTML = `<p class="lib-error">⚠ Error cargando: ${escapeHtml(e.message)}</p>`;
      return;
    }
    loadingEl.remove();

    itemsCache = new Map(items.map(i => [i.id, i]));

    if (folders.length) {
      folderLabel.style.display = '';
      folderList.innerHTML = folders.map(f => `
        <div class="lib-card lib-card--folder" onclick="enterFolder('${f.id}', '${escapeHtml(f.name)}')">
          <div class="lib-card__top">
            <div class="lib-card__icon">📁</div>
            <div class="lib-card__name">${escapeHtml(f.name)}</div>
          </div>
          <div class="lib-card__actions" onclick="event.stopPropagation()">
            <button onclick="handleRenameFolder('${f.id}')">✏️ Renombrar</button>
            <button class="danger" onclick="handleDeleteFolder('${f.id}')">🗑 Borrar</button>
          </div>
        </div>
      `).join('');
    }

    if (items.length) {
      itemLabel.style.display = '';
      itemList.innerHTML = items.map(i => `
        <div class="lib-card">
          <div class="lib-card__top">
            <div class="lib-card__icon">${ICONS[i.type] || '📦'}</div>
            <div>
              <div class="lib-card__name">${escapeHtml(i.name)}</div>
              ${i.lesson_id ? `<div class="lib-card__meta">Lección: ${escapeHtml(i.lesson_id)}</div>` : ''}
            </div>
          </div>
          <div class="lib-card__actions">
            <button onclick="handleOpenItem('${i.id}')">👁 Abrir</button>
            <button class="danger" onclick="handleDeleteItem('${i.id}')">🗑 Borrar</button>
          </div>
        </div>
      `).join('');
    }

    if (!folders.length && !items.length) {
      empty.style.display = '';
    }
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function renderBreadcrumb() {
    const el = document.getElementById('breadcrumb');
    const root = `<span onclick="goToBreadcrumb(-1)">🏠 Raíz</span>`;
    const rest = breadcrumbTrail.map((b, idx) =>
      `<span class="lib-breadcrumb__sep">/</span><span onclick="goToBreadcrumb(${idx})">${escapeHtml(b.name)}</span>`
    ).join('');
    el.innerHTML = root + rest;
  }

  function enterFolder(id, name) {
    breadcrumbTrail.push({ id, name });
    currentFolderId = id;
    render();
  }

  function goToBreadcrumb(idx) {
    if (idx === -1) {
      breadcrumbTrail = [];
      currentFolderId = null;
    } else {
      breadcrumbTrail = breadcrumbTrail.slice(0, idx + 1);
      currentFolderId = breadcrumbTrail[idx].id;
    }
    render();
  }

  async function handleCreateFolder() {
    const name = document.getElementById('newFolderName').value.trim();
    if (!name) return;
    try {
      await createFolder(name, currentFolderId);
      document.getElementById('newFolderName').value = '';
      newFolderDialog.close();
      render();
    } catch (e) {
      alert('Error creando carpeta: ' + e.message);
    }
  }

  async function handleRenameFolder(id) {
    const newName = prompt('Nuevo nombre:');
    if (!newName) return;
    try {
      await renameFolder(id, newName.trim());
      render();
    } catch (e) {
      alert('Error al renombrar: ' + e.message);
    }
  }

  async function handleDeleteFolder(id) {
    if (!confirm('¿Borrar esta carpeta? Las subcarpetas también se borran.')) return;
    try {
      await deleteFolder(id);
      render();
    } catch (e) {
      alert('Error al borrar: ' + e.message);
    }
  }

  async function handleUploadFile() {
    const type = document.getElementById('uploadType').value;
    const fileInput = document.getElementById('uploadFile');
    const lessonId = document.getElementById('uploadLessonId').value.trim() || null;
    const file = fileInput.files[0];
    if (!file) return alert('Elegí un archivo');

    const btn = document.getElementById('uploadFileBtn');
    btn.disabled = true;
    btn.textContent = 'Subiendo…';
    try {
      await uploadFileItem({ file, type, folderId: currentFolderId, lessonId });
      fileInput.value = '';
      document.getElementById('uploadLessonId').value = '';
      uploadFileDialog.close();
      render();
    } catch (e) {
      alert('Error subiendo archivo: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Subir';
    }
  }

  async function handleAddLink() {
    const type = document.getElementById('linkType').value;
    const name = document.getElementById('linkName').value.trim();
    const url = document.getElementById('linkUrl').value.trim();
    const lessonId = document.getElementById('linkLessonId').value.trim() || null;
    if (!name || !url) return alert('Completá nombre y URL');

    try {
      await createLinkItem({ name, type, url, folderId: currentFolderId, lessonId });
      document.getElementById('linkName').value = '';
      document.getElementById('linkUrl').value = '';
      document.getElementById('linkLessonId').value = '';
      addLinkDialog.close();
      render();
    } catch (e) {
      alert('Error agregando link: ' + e.message);
    }
  }

  async function handleOpenItem(id) {
    const item = itemsCache.get(id);
    if (!item) return;
    try {
      await openItem(item);
    } catch (e) {
      alert('Error al abrir el archivo: ' + e.message);
    }
  }

  async function handleDeleteItem(id) {
    const item = itemsCache.get(id);
    if (!item) return;
    if (!confirm(`¿Borrar "${item.name}"?`)) return;
    try {
      await deleteItem(item);
      render();
    } catch (e) {
      alert('Error al eliminar: ' + e.message);
    }
  }

  render();
</script>
</body>
</html>
